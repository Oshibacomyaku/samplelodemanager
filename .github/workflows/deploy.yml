name: deploy
on:
  push:
    branches: [main]
jobs:
  reapack-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Fetch repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure git
        run: |-
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
      - name: Install Pandoc
        run: sudo apt-get install -yy pandoc
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
      - name: Install reapack-index
        run: gem install reapack-index
      # --rebuild: 既存 index とメイン名のズレ（旧ファイル名のまま等）を残さず、リポジトリから index を作り直す
      - name: Update index.xml
        run: reapack-index --commit --rebuild -o index.xml .
      - name: Push changes
        run: git push
