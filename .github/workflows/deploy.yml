name: deploy
on:
  push:
    branches: [main]
jobs:
  reapack-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Fetch repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure git
        run: |-
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
      - name: Install Pandoc
        run: sudo apt-get install -yy pandoc
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
      - name: Install reapack-index
        run: gem install reapack-index
      # --rebuild: 既存 index とメイン名のズレ（旧ファイル名のまま等）を残さず、リポジトリから index を作り直す
      # --amend: 同じ @version のまま @changelog やスクリプトを直したときも index の取得元コミットを更新する
      - name: Update index.xml
        run: reapack-index --commit --rebuild --amend -o index.xml .
      # ルート <metadata> の RTF に README の `src/**/*.lua` 等が入り、全文 grep が誤カウントするので <source 行だけ数える
      - name: Refuse incomplete index (do not push)
        run: |
          n_file=$(grep '<source' index.xml | grep -cE 'file="src/' || true)
          n_url=$(grep '<source' index.xml | grep -cE '/SampleLodeManager/src/.+\.(lua|py)' || true)
          if [ "$n_file" -lt 10 ] && [ "$n_url" -lt 10 ]; then
            echo "reapack-index produced too few src/ <source> rows (file=\"src/: $n_file, url path: $n_url); aborting push."
            exit 1
          fi
      - name: Push changes
        run: git push
