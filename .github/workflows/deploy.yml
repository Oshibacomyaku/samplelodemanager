name: deploy
on:
  push:
    branches: [main]
jobs:
  reapack-index:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repository
        uses: actions/checkout@v4
      - name: Install Pandoc
        run: sudo apt-get install -yy pandoc
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
      - name: Install reapack-index
        run: gem install reapack-index
      # index.xml はリリースコミットに同梱する（@provides 明示時は手動/ローカル reapack-index の方が
      # --commit/--amend より src/ 行が欠けにくい）。ここでは検証のみ行う。
      - name: Validate packages
        run: reapack-index --check -i tests -i scripts .
      # ルート <metadata> の RTF に README の `src/**/*.lua` 等が入り、全文 grep が誤カウントするので <source 行だけ数える。
      # さらに「index 先頭 commit URL」に紐づく <source> が十分あるかも見る（main だけの版を防ぐ）。
      - name: Refuse incomplete index
        run: |
          n_file=$(grep '<source' index.xml | grep -cE 'file="src/' || true)
          n_url=$(grep '<source' index.xml | grep -cE '/SampleLodeManager/src/.+\.(lua|py)' || true)
          if [ "$n_file" -lt 10 ] && [ "$n_url" -lt 10 ]; then
            echo "index.xml has too few src/ <source> rows (file=\"src/: $n_file, url path: $n_url)."
            exit 1
          fi
          head_commit=$(grep -oE 'commit="[0-9a-f]+"' index.xml | head -1 | tr -d '"' | cut -d= -f2)
          if [ -n "$head_commit" ]; then
            n_head=$(grep '<source' index.xml | grep -c "$head_commit" || true)
            if [ "$n_head" -lt 20 ]; then
              echo "Too few <source> rows for index head commit $head_commit (got $n_head)."
              exit 1
            fi
          fi
      - name: Verify @provides vs index.xml (latest version)
        run: python3 scripts/verify_index_provides.py
