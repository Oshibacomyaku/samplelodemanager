# Build lsqlite3complete (Lua 5.4 via LuaRocks) for macOS and commit into bin/darwin64 + bin/darwin-arm64.
# Run: Actions → "Bundle lsqlite3complete (macOS)" → Run workflow.
# Requires: default GITHUB_TOKEN with contents: write (enabled for Actions in repo Settings).

name: Bundle lsqlite3complete (macOS)

on:
  workflow_dispatch:

# leafo/gh-actions-lua はビルド成果を Actions Cache に保存する。Cache API が 400 や一時障害だと
# 「Failed to save / restore」でジョブ全体が失敗することがあるので、キャッシュを切る。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            dest: darwin-arm64
          - runner: macos-15-intel
            dest: darwin64
    runs-on: ${{ matrix.runner }}
    steps:
      # v10/v5 は Node 非推奨警告があり、macOS ランナーで不安定なことがある。v12/v6 を推奨。
      - uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: "5.4.7"
          buildCache: "false"
      - uses: leafo/gh-actions-luarocks@v6
      - name: Install lsqlite3complete
        run: luarocks install lsqlite3complete
      - name: Copy artifact
        shell: bash
        run: |
          set -euo pipefail
          # leafo/gh-actions-luarocks はワークスペース配下の .luarocks/ に入れることが多く、$HOME/.luarocks だけ見ると失敗する
          SO="$(find "${GITHUB_WORKSPACE}" "${HOME}" -name 'lsqlite3complete.so' -type f 2>/dev/null | head -1 || true)"
          if [[ -z "${SO}" ]]; then
            echo "lsqlite3complete.so not found; debug paths:"
            find "${GITHUB_WORKSPACE}" -maxdepth 4 -type d 2>/dev/null || true
            luarocks list
            exit 1
          fi
          echo "Using: ${SO}"
          cp "${SO}" "${GITHUB_WORKSPACE}/lsqlite3complete-${{ matrix.dest }}.so"
      - uses: actions/upload-artifact@v4
        with:
          name: lsqlite-${{ matrix.dest }}
          path: lsqlite3complete-${{ matrix.dest }}.so

  commit:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: _artifacts
      - name: Install binaries and patch @provides
        run: |
          set -e
          mkdir -p SampleLodeManager/bin/darwin64 SampleLodeManager/bin/darwin-arm64
          cp "_artifacts/lsqlite-darwin64/lsqlite3complete-darwin64.so" SampleLodeManager/bin/darwin64/lsqlite3complete.so
          cp "_artifacts/lsqlite-darwin-arm64/lsqlite3complete-darwin-arm64.so" SampleLodeManager/bin/darwin-arm64/lsqlite3complete.so
          python3 << 'PY'
          from pathlib import Path
          p = Path("SampleLodeManager/oshibacomyaku_Sample Lode Manager.lua")
          t = p.read_text(encoding="utf-8")
          if "bin/darwin64/lsqlite3complete.so" in t:
              print("@provides already contains darwin64; skipping header patch")
          else:
              needle = "-- @provides [win64 nomain] bin/win64/lsqlite3complete.dll\n"
              ins = (
                  needle
                  + "-- @provides [darwin64 nomain] bin/darwin64/lsqlite3complete.so\n"
                  + "-- @provides [darwin-arm64 nomain] bin/darwin-arm64/lsqlite3complete.so\n"
              )
              if needle not in t:
                  raise SystemExit("expected win64 @provides line not found; edit oshibacomyaku_Sample Lode Manager.lua")
              p.write_text(t.replace(needle, ins, 1), encoding="utf-8")
              print("patched @provides for darwin64 + darwin-arm64")
          PY
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SampleLodeManager/bin/darwin64/lsqlite3complete.so SampleLodeManager/bin/darwin-arm64/lsqlite3complete.so "SampleLodeManager/oshibacomyaku_Sample Lode Manager.lua"
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "ci: bundle lsqlite3complete for macOS (darwin64, darwin-arm64)"
          git push
