name: check
on: [push, pull_request]
jobs:
  reapack-index:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repository
        uses: actions/checkout@v4
      - name: Install Pandoc
        run: sudo apt-get install -yy pandoc
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
      - name: Install reapack-index
        run: gem install reapack-index
      - name: Validate packages
        # tests/ and scripts/ are dev-only; not ReaPack packages (no @version).
        run: reapack-index --check -i tests -i scripts .
      # Multi-file パッケージは index に <source file="src/..."> が無いと、ReaPack がエントリだけ更新して app.lua が古いまま残る
      - name: Verify index lists src/* sources
        run: |
          n_file=$(grep '<source' index.xml | grep -cE 'file="src/' || true)
          n_url=$(grep '<source' index.xml | grep -cE '/SampleLodeManager/src/.+\.(lua|py)' || true)
          if [ "$n_file" -lt 10 ] && [ "$n_url" -lt 10 ]; then
            echo "index.xml must list src/*.lua and src/python/* via <source> rows (file=\"src/: $n_file, url: $n_url)."
            exit 1
          fi
      - name: Verify @provides vs index.xml (latest version)
        run: python3 scripts/verify_index_provides.py
  lua-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repository
        uses: actions/checkout@v4
      - uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: "5.4.6"
      - uses: leafo/gh-actions-luarocks@v4
      - name: Luacheck (static analysis)
        run: |
          luarocks install luacheck
          eval "$(luarocks path)"
          luacheck --config .luacheckrc SampleLodeManager/src tests --no-color
      - name: Syntax check (luac -p)
        run: |
          eval "$(luarocks path)"
          find SampleLodeManager/src -name '*.lua' -print0 | while IFS= read -r -d '' f; do
            luac -p "$f" || exit 1
          done
      - name: Busted unit tests
        run: |
          luarocks install busted
          eval "$(luarocks path)"
          busted --verbose -o TAP
