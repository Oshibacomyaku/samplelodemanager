name: check
on: [push, pull_request]
jobs:
  reapack-index:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repository
        uses: actions/checkout@v4
      - name: Install Pandoc
        run: sudo apt-get install -yy pandoc
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
      - name: Install reapack-index
        run: gem install reapack-index
      - name: Validate packages
        run: reapack-index --check .
      # Multi-file パッケージは index に <source file="src/..."> が無いと、ReaPack がエントリだけ更新して app.lua が古いまま残る
      - name: Verify index lists src/* sources
        run: |
          n=$(grep -cE 'file="src/' index.xml || true)
          if [ "$n" -lt 10 ]; then
            echo "index.xml must list src/*.lua and src/python/* (found $n lines with file=\"src/)."
            exit 1
          fi
